<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic AI Interface</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.8; }
    }

    .step {
      animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    /* Custom scrollbar for the log */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
    
    .workflow-step {
      transition: all 0.3s ease;
    }
    .workflow-step.active {
      transform: scale(1.05);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
    }
    .workflow-step.active .step-icon {
      animation: pulse-glow 2s infinite;
    }
  </style>
</head>
<body class="bg-[#0b0f19] text-slate-200 min-h-screen flex flex-col relative overflow-x-hidden selection:bg-indigo-500/30">

  <!-- Ambient Background Glows -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden flex justify-center items-center">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-600/10 blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-emerald-600/10 blur-[120px]"></div>
  </div>

<!-- Sleek Navbar -->
<nav class="relative z-50 border-b border-white/5 bg-[#0b0f19]/80 backdrop-blur-xl">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-emerald-400 flex items-center justify-center shadow-lg shadow-indigo-500/20">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <span class="text-xl font-bold tracking-tight text-white">Agentic<span class="text-indigo-400">AI</span></span>
      </div>
      <div class="hidden md:flex space-x-1">
        <a href="#" class="px-4 py-2 text-sm font-medium text-slate-300 hover:text-white hover:bg-white/5 rounded-md transition-all">Overview</a>
        <a href="#" class="px-4 py-2 text-sm font-medium text-slate-300 hover:text-white hover:bg-white/5 rounded-md transition-all">Documentation</a>
        <a href="#" class="px-4 py-2 text-sm font-medium text-slate-300 hover:text-white hover:bg-white/5 rounded-md transition-all">Settings</a>
      </div>
      <div class="flex items-center">
        <button class="text-sm font-medium bg-white/5 hover:bg-white/10 border border-white/10 px-4 py-2 rounded-lg transition-all text-white">
          Deploy Agent
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- Main Interface -->
<main class="relative z-10 flex-grow container max-w-4xl mx-auto px-4 py-16 flex flex-col items-center">
  
  <header class="text-center space-y-4 mb-10">
    <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight text-white inline-flex items-center gap-3">
      Autonomous Task Execution
    </h1>
    <p class="text-lg text-slate-400 max-w-2xl mx-auto leading-relaxed">
      Define an objective and let the agent autonomously plan, decide, and act. Built with an optimized feedback loop.
    </p>
  </header>

  <!-- Interactive Workflow Visualization -->
  <div class="w-full max-w-3xl mb-12 hidden sm:flex items-center justify-between relative">
    <!-- Connecting Line -->
    <div class="absolute top-1/2 left-0 right-0 h-0.5 bg-slate-800 -z-10 transform -translate-y-1/2"></div>
    
    <div id="step-think" class="workflow-step flex flex-col items-center gap-3 bg-[#0b0f19] px-4 py-2 rounded-xl border border-slate-800 opacity-50">
      <div class="w-10 h-10 rounded-full bg-slate-800/80 border border-slate-700 flex items-center justify-center step-icon">
        <span class="w-3 h-3 rounded-full bg-indigo-500 shadow-[0_0_10px_rgba(99,102,241,0.8)]"></span>
      </div>
      <span class="text-xs font-mono font-medium text-slate-300 uppercase tracking-widest">Think</span>
    </div>

    <div id="step-decide" class="workflow-step flex flex-col items-center gap-3 bg-[#0b0f19] px-4 py-2 rounded-xl border border-slate-800 opacity-50">
      <div class="w-10 h-10 rounded-full bg-slate-800/80 border border-slate-700 flex items-center justify-center step-icon">
        <span class="w-3 h-3 rounded-full bg-amber-400 shadow-[0_0_10px_rgba(251,191,36,0.8)]"></span>
      </div>
      <span class="text-xs font-mono font-medium text-slate-300 uppercase tracking-widest">Decide</span>
    </div>

    <div id="step-act" class="workflow-step flex flex-col items-center gap-3 bg-[#0b0f19] px-4 py-2 rounded-xl border border-slate-800 opacity-50">
      <div class="w-10 h-10 rounded-full bg-slate-800/80 border border-slate-700 flex items-center justify-center step-icon">
        <span class="w-3 h-3 rounded-full bg-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.8)]"></span>
      </div>
      <span class="text-xs font-mono font-medium text-slate-300 uppercase tracking-widest">Act</span>
    </div>

    <div id="step-observe" class="workflow-step flex flex-col items-center gap-3 bg-[#0b0f19] px-4 py-2 rounded-xl border border-slate-800 opacity-50">
      <div class="w-10 h-10 rounded-full bg-slate-800/80 border border-slate-700 flex items-center justify-center step-icon">
        <span class="w-3 h-3 rounded-full bg-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.8)]"></span>
      </div>
      <span class="text-xs font-mono font-medium text-slate-300 uppercase tracking-widest">Observe</span>
    </div>
  </div>

  <!-- Control Panel -->
  <div class="w-full bg-[#111827]/80 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-2 mb-8 relative z-20">
    <div class="flex flex-col sm:flex-row gap-2">
      <div class="relative flex-grow">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
        <input id="goal" type="text" placeholder="Assign a new objective (e.g., 'Check weather in London')" 
          class="w-full pl-11 pr-4 py-4 bg-transparent border-none text-white placeholder-slate-500 focus:outline-none focus:ring-0 text-base"
          onkeydown="if(event.key === 'Enter') runAgent()"
        >
      </div>
      <button onclick="runAgent()" id="runBtn"
        class="group relative sm:w-auto w-full px-8 py-4 bg-indigo-500 hover:bg-indigo-400 text-white font-semibold rounded-xl transition-all duration-300 overflow-hidden flex items-center justify-center gap-2">
        <span class="relative z-10">Initialize Run</span>
        <svg class="w-4 h-4 relative z-10 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
      </button>
    </div>
  </div>

  <!-- Execution Terminal -->
  <div id="terminal-wrapper" class="w-full rounded-2xl border border-white/10 bg-[#0f172a] shadow-2xl overflow-hidden hidden transition-all duration-500 opacity-0 transform translate-y-4 relative z-20">
    <!-- Terminal Header -->
    <div class="flex items-center px-4 py-3 bg-[#1e293b]/80 border-b border-white/5">
      <div class="flex space-x-2">
        <div class="w-3 h-3 rounded-full bg-rose-500/80"></div>
        <div class="w-3 h-3 rounded-full bg-amber-500/80"></div>
        <div class="w-3 h-3 rounded-full bg-emerald-500/80"></div>
      </div>
      <div class="mx-auto flex items-center gap-2 text-xs font-mono text-slate-400">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        agent-execution-log
      </div>
      <div class="w-12"></div> <!-- Spacer for balance -->
    </div>
    
    <!-- Terminal Body -->
    <div id="log" class="p-5 font-mono text-sm leading-relaxed text-slate-300 min-h-[250px] max-h-[400px] overflow-y-auto space-y-1">
      <!-- Logs will be injected here -->
    </div>
  </div>

</main>

<script>
function updateWorkflowUI(activeStepId) {
  const steps = ['step-think', 'step-decide', 'step-act', 'step-observe'];
  steps.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (id === activeStepId) {
      el.classList.add('active', 'opacity-100');
      el.classList.remove('opacity-50');
    } else {
      el.classList.remove('active', 'opacity-100');
      el.classList.add('opacity-50');
    }
  });
}

function resetWorkflowUI() {
  const steps = ['step-think', 'step-decide', 'step-act', 'step-observe'];
  steps.forEach(id => {
    const el = document.getElementById(id);
    if(el) {
      el.classList.remove('active', 'opacity-100');
      el.classList.add('opacity-50');
    }
  });
}

function log(htmlContent, type = 'info'){
  const logDiv = document.getElementById("log")
  
  const stepDiv = document.createElement("div")
  stepDiv.className = "step flex items-start py-1.5"
  
  // Choose icon/color based on type
  let prefix = `<span class="text-slate-500 mr-3 select-none">❯</span>`;
  if(type === 'goal') prefix = `<span class="text-indigo-400 mr-3 select-none">■</span>`;
  else if(type === 'think') prefix = `<span class="text-purple-400 mr-3 select-none">⟳</span>`;
  else if(type === 'decide') prefix = `<span class="text-amber-400 mr-3 select-none">⚡</span>`;
  else if(type === 'act') prefix = `<span class="text-rose-400 mr-3 select-none">▶</span>`;
  else if(type === 'observe') prefix = `<span class="text-cyan-400 mr-3 select-none">◎</span>`;
  else if(type === 'success') prefix = `<span class="text-emerald-400 mr-3 select-none">✔</span>`;

  stepDiv.innerHTML = `${prefix}<span class="flex-1">${htmlContent}</span>`
  logDiv.appendChild(stepDiv)
  
  logDiv.scrollTop = logDiv.scrollHeight;
}

async function runAgent(){
  const wrapper = document.getElementById("terminal-wrapper")
  const logDiv = document.getElementById("log")
  const btn = document.getElementById("runBtn")
  
  // UI States
  wrapper.classList.remove("hidden")
  setTimeout(() => {
    wrapper.classList.remove("opacity-0", "translate-y-4")
  }, 10);
  
  logDiv.innerHTML = ""
  resetWorkflowUI()
  
  btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Executing...`
  btn.classList.add("opacity-80", "cursor-not-allowed")
  btn.disabled = true;

  const input = document.getElementById("goal")
  const goal = input.value.trim() || "Perform default diagnostics"
  input.value = "" // clear after taking

  log(`<span class="text-slate-400">[System]</span> Objective received: <span class="text-white font-medium">${goal}</span>`, 'goal')

  await think(goal)
  
  // Reset btn
  btn.innerHTML = `<span class="relative z-10">Initialize Run</span><svg class="w-4 h-4 relative z-10 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>`
  btn.classList.remove("opacity-80", "cursor-not-allowed")
  btn.disabled = false;
  
  setTimeout(() => resetWorkflowUI(), 2000);
}

async function think(goal){
  updateWorkflowUI('step-think')
  log(`Analyzing objective context and formulating plan...`, 'think')
  await sleep(1200)
  decide(goal)
}

async function decide(goal){
  updateWorkflowUI('step-decide')
  log(`Synthesizing action space. Selecting optimal tool.`, 'decide')
  await sleep(800)
  let action

  const g = goal.toLowerCase()
  if(g.includes("weather")){
    action = "fetch_weather_api"
  }
  else if(g.includes("time")){
    action = "get_system_time"
  }
  else{
    action = "web_search_query"
  }

  log(`Decision reached: <span class="text-amber-300 font-medium">${action}</span>`, 'decide')
  await sleep(500)
  await act(action)
}

async function act(action){
  updateWorkflowUI('step-act')
  log(`Executing tool: <span class="text-rose-300 font-medium">${action}()</span>`, 'act')
  await sleep(1500)
  let result

  if(action === "fetch_weather_api"){
    result = "{ status: 200, data: { temp: 28, condition: 'Sunny' } }"
  }
  else if(action === "get_system_time"){
    result = `{ time: "${new Date().toLocaleTimeString()}" }`
  }
  else{
    result = "{ status: 200, results: [ 'simulated_search_data_found' ] }"
  }

  await observe(result)
}

async function observe(result){
  updateWorkflowUI('step-observe')
  log(`Tool output received: <span class="text-cyan-300">${result}</span>`, 'observe')
  await sleep(800)
  log(`Objective successfully achieved. Awaiting next command.`, 'success')
}

function sleep(ms){
  return new Promise(resolve => setTimeout(resolve, ms))
}
</script>

</body>
</html>
