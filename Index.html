<!DOCTYPE html>
<html>
<head>
  <title>Basic Agentic AI</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    /* Navbar Styles */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e293b;
      padding: 15px 30px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    .nav-logo {
      font-size: 24px;
      font-weight: bold;
      color: #22c55e;
    }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    .nav-links li a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      transition: color 0.3s;
    }
    .nav-links li a:hover {
      color: #22c55e;
    }
    @media (max-width: 600px) {
      .navbar {
        flex-direction: column;
        gap: 15px;
      }
    }

    /* Main Content Styles */
    .container {
      padding: 40px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #log {
      margin-top: 30px;
      text-align: left;
      background: #020617;
      padding: 20px;
      border-radius: 10px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .step {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar">
  <div class="nav-logo">AgenticAI</div>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<div class="container">
  <h1>🤖 Simple Agentic AI</h1>
  <p>Agent Loop: Think → Decide → Act → Observe</p>

  <input id="goal" placeholder="Enter goal..." style="width:300px;padding:10px;">
  <br><br>

  <button onclick="runAgent()">Run Agent</button>

  <div id="log"></div>
</div>

<script>

function log(message){
  const logDiv = document.getElementById("log")
  logDiv.innerHTML += `<div class="step">${message}</div>`
}

async function runAgent(){

  document.getElementById("log").innerHTML = ""

  const goal = document.getElementById("goal").value

  log("🎯 Goal: " + goal)

  await think(goal)
}

async function think(goal){

  log("🧠 Thinking about the goal...")

  await sleep(1000)

  decide(goal)
}

function decide(goal){

  log("📋 Deciding best action...")

  let action

  if(goal.toLowerCase().includes("weather")){
    action = "getWeather"
  }
  else if(goal.toLowerCase().includes("time")){
    action = "getTime"
  }
  else{
    action = "searchInternet"
  }

  act(action)
}

function act(action){

  log("⚡ Acting: " + action)

  let result

  if(action === "getWeather"){
    result = "Weather is 28°C ☀️"
  }

  else if(action === "getTime"){
    result = new Date().toLocaleTimeString()
  }

  else{
    result = "Pretend we searched the internet 🔎"
  }

  observe(result)
}

function observe(result){

  log("👀 Observing result: " + result)

  log("✅ Task completed")
}

function sleep(ms){
  return new Promise(resolve => setTimeout(resolve, ms))
}

</script>

</body>
</html>
